version: '3.9'

services:

  # -------------------------------------------------------
  # MongoDB
  # -------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: matricula-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: matriculas
    volumes:
      - mongodb_data:/data/db
      - ./mongo-seed/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # Zookeeper
  # -------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: matricula-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # Kafka
  # -------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: matricula-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT  → acessível pelo host (localhost:9092)
      # PLAINTEXT_INTERNAL → acessível pelos demais containers (kafka:29092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # -------------------------------------------------------
  # Mock API de Ciclos (WireMock)
  # -------------------------------------------------------
  mock-ciclo-api:
    build:
      context: ./mock-ciclo-api
      dockerfile: Dockerfile
    container_name: mock-ciclo-api
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------
  # Aplicação — matricula-process
  # -------------------------------------------------------
  matricula-process:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matricula-process
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/matriculas
      MONGODB_DATABASE: matriculas
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_GROUP_ID: matricula-process-group
      KAFKA_TOPIC_TURMA_ATUALIZADA: turma-atualizada
      KAFKA_TOPIC_MATRICULA_ATUALIZADA: matricula-atualizada
      CICLO_API_URL: http://mock-ciclo-api:8080
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mock-ciclo-api:
        condition: service_healthy
    restart: on-failure

volumes:
  mongodb_data:
