version: '3.9'

services:

  mock-ciclo-api:
    build:
      context: ./mock-ciclo-api
      dockerfile: Dockerfile
    container_name: mock-ciclo-api
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/health"]
      interval: 10s
      timeout: 5s
      retries: 3
